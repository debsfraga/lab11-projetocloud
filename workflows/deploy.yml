name: Deploy para EC2

on:
  push:
    branches:
      - main  # dispara a pipeline a cada push na branch main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Baixa o código do repositório
      - name: Checkout do código
        uses: actions/checkout@v3

      # 2. Copia o index.html para a instância EC2 via SCP
      - name: Copiar arquivos para EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "index.html,nginx.conf"
          target: "/tmp/deploy"

      # 3. Executa comandos na EC2 para publicar os arquivos
      - name: Publicar no servidor
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            # Mover os arquivos para o diretório do Nginx
            sudo cp /tmp/deploy/index.html /var/www/html/index.html
            sudo cp /tmp/deploy/nginx.conf /etc/nginx/sites-available/default
            
            # Ajustar permissões
            sudo chown www-data:www-data /var/www/html/index.html
            sudo chmod 644 /var/www/html/index.html
            
            # Recarregar o Nginx para aplicar mudanças
            sudo nginx -t && sudo systemctl reload nginx
            
            echo "Deploy concluído com sucesso!"
