name: Deploy para EC2 com Docker

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      # Build da imagem Docker (verifica se o Dockerfile está correto)
      - name: Build da imagem Docker
        run: |
          docker build -t lab11-dermapura:latest .
          echo "Docker build concluído com sucesso"

      # Copia arquivos para EC2
      - name: Copiar arquivos para EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          source: "index.html,nginx.conf,Dockerfile"
          target: "/tmp/deploy"

      # Executa na EC2: rebuilda e sobe o container
      - name: Deploy com Docker na EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            cd /tmp/deploy
            
            # Parar e remover container anterior (se existir)
            docker stop lab11-dermapura 2>/dev/null || true
            docker rm lab11-dermapura 2>/dev/null || true
            
            # Construir nova imagem
            docker build -t lab11-dermapura:latest .
            
            # Subir novo container
            docker run -d \
              --name lab11-dermapura \
              --restart unless-stopped \
              -p 80:80 \
              lab11-dermapura:latest
            
            echo "Container em execução!"
            docker ps | grep lab11-dermapura
